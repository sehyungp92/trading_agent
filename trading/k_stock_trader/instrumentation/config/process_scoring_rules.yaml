# Process Scoring Rules
# Used by ProcessScorer to evaluate trade execution quality.
# Scores are deterministic: same trade_dict + rules = same score.

global:
  max_entry_latency_ms: 5000
  max_slippage_multiplier: 2.0
  min_signal_strength: 0.3
  strong_signal_threshold: 0.7

strategies:
  pcim:
    # Event-driven influencer signal
    preferred_regimes:
      - trending_up
      - ranging
    adverse_regimes:
      - volatile
    expected_slippage_bps: 15
