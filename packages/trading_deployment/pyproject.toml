[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "trading-deployment"
version = "0.1.0"
description = "Shared deployment validation interfaces for the trading workspace."
requires-python = ">=3.12"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/trading_deployment"]

[tool.pytest.ini_options]
pythonpath = ["src"]

