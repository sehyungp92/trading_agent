# OMS Configuration
# This file configures the Order Management System for multi-strategy trading.

# Strategy Budgets
# Each strategy has its own risk budget limiting positions and risk exposure.
# - max_positions: Maximum concurrent positions for this strategy
# - max_risk_pct: Maximum risk per trade as percentage of equity

active_strategies:
  - KALCB
  - OLR

strategy_budgets:
  KALCB:
    # KALCB: opening-range continuation strategy
    max_positions: 4
    max_risk_pct: 0.010   # 1.0% of equity per trade
    capital_allocation_pct: 0.50

  OLR:
    # OLR: overnight/late-session reversal strategy
    max_positions: 4
    max_risk_pct: 0.010   # 1.0% of equity per trade
    capital_allocation_pct: 0.50

  PCIM:
    # PCIM: YouTube Signal Strategy
    # Evening + 08:00-15:00, varies by signals
    max_positions: 8
    max_risk_pct: 0.025   # 2.5% of equity per trade
    capital_allocation_pct: 1.00


# Risk Configuration
# Global risk parameters applied to all strategies

risk:
  # Daily circuit breakers
  daily_loss_warn_pct: 0.03   # 3% daily loss triggers warning, halts new entries
  daily_loss_halt_pct: 0.05   # 5% daily loss triggers hard halt

  # Exposure limits
  max_gross_exposure_pct: 0.90  # Max 90% gross exposure
  max_net_exposure_pct: 0.70    # Max 70% net exposure
  max_position_pct: 0.15        # Max 15% per single position
  max_positions_count: 15       # Max 15 total positions across all strategies
  max_sector_pct: 0.30          # Max 30% in single sector
  unknown_sector_policy: block  # Active paper/live symbols must be sector-mapped

  # Microstructure
  max_spread_bps: 50.0      # Max 50bps spread for entry
  vi_cooldown_sec: 600.0    # 10 min cooldown after VI trigger

  # Durable protective stops
  require_durable_stops: true
  default_stop_protection_mode: oms_watcher
  allow_synthetic_stop_only: false
  stop_price_stale_after_sec: 30.0
  stop_watcher_interval_sec: 5.0
  stop_exit_order_type: MARKET
  stop_protection_emergency_override: false


# Approved OMS sector map used by the independent OMS risk backstop.
sector_map_path: config/olr/sector_map.yaml


# Regime-based exposure caps
# PCIM sets the regime at 08:30 based on market conditions.
# These caps override the static max_gross_exposure_pct.

regime_exposure_caps:
  CRISIS: 0.20   # Max 20% exposure in crisis
  WEAK: 0.50     # Max 50% exposure in weak market
  NORMAL: 0.80   # Max 80% exposure in normal market
  STRONG: 1.00   # Full exposure in strong market


# Rate Limiting Priority Windows (KST)
# During priority windows, the specified strategy gets 2x API rate budget.

priority_windows: {}
