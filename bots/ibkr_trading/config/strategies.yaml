connection_groups:
  # Single connection group — all families share one IB Gateway connection.
  # Multi-group was creating 3 connections but only the first was used
  # (execution_adapter.py routes everything through session.ib).
  default:
    host: "${IB_HOST:127.0.0.1}"
    port: "${IB_PORT:4002}"
    client_id: 7
    account_id: "${IB_ACCOUNT_ID}"
    readonly: false

strategies:
  ATRSS:
    strategy_id: ATRSS
    system_id: swing_trader
    family: swing
    connection_group: default
    display_name: "ATR Swing Strategy"
    module_path: "strategies.swing.atrss.plugin"

    enabled: true
    paper_mode: false
    asset_class: mixed
    symbols: [QQQ, GLD]
    risk:
      unit_risk_dollars: 200.0
      daily_stop_R: 2.25
      max_working_orders: 4
      max_heat_R: 2.15
      priority: 0
    allocation:
      base_risk_pct: 0.0165
      equity_offset: 0.0
    dashboard_metadata:
      system_label: "Swing Trader"
      short_label: "SWING"
      color_key: "blue"
    deployment_tags: [live, paper, swing]

