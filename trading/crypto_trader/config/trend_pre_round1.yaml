strategy:
  h1_indicators:
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    adx_period: 14
    atr_period: 14
    rsi_period: 14
    volume_ma_period: 20
    atr_avg_period: 20
  d1_indicators:
    ema_fast: 21
    ema_mid: 50
    ema_slow: 50
    adx_period: 14
    atr_period: 14
    rsi_period: 14
    volume_ma_period: 20
    atr_avg_period: 20
  m15_indicators:
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    adx_period: 14
    atr_period: 14
    rsi_period: 14
    volume_ma_period: 20
    atr_avg_period: 20
  regime:
    a_min_adx: 12.0
    b_min_adx: 12.0
    b_adx_rising_required: false
    require_ema_cross: false
    require_structure: false
    structure_lookback: 10
    no_trade_max_adx: 10.0
    h1_regime_enabled: false
    h1_min_adx: 20.0
  setup:
    impulse_min_bars: 3
    impulse_min_atr_move: 1.5
    impulse_lookback: 30
    pullback_max_retrace: 0.75
    pullback_max_bars: 15
    pullback_rsi_low: 30.0
    pullback_rsi_high: 65.0
    min_confluences: 0
    require_orderly_pullback: false
    min_room_r: 1.0
    min_room_r_a: 2.0
    require_completed_impulse: true
  confirmation:
    enable_engulfing: true
    enable_hammer: true
    enable_ema_reclaim: true
    enable_structure_break: true
    require_confirmation: false
    require_volume_confirm: false
    volume_threshold_mult: 1.0
    hammer_wick_ratio: 2.0
    max_bars_after_setup: 3
  entry:
    entry_on_close: true
    entry_on_break: false
    max_bars_after_confirmation: 2
  stops:
    atr_mult: 1.3
    use_swing: true
    use_farther: true
    min_stop_atr: 1.0
    swing_lookback: 10
    buffer_pct: 0.001
  exits:
    tp1_r: 1.2
    tp1_frac: 0.25
    tp2_r: 2.0
    tp2_frac: 0.5
    runner_frac: 0.25
    time_stop_bars: 12
    time_stop_min_progress_r: 0.3
    time_stop_action: reduce
    be_after_tp1: true
    be_buffer_r: 0.2
    be_min_bars_above: 4
    ema_failsafe_enabled: true
    ema_failsafe_period: 20
    ema_failsafe_min_expansion_r: 1.0
    quick_exit_enabled: true
    quick_exit_bars: 12
    quick_exit_max_mfe_r: 0.15
    quick_exit_max_r: -0.2
  trail:
    trail_r_adaptive: true
    trail_buffer_wide: 1.2
    trail_buffer_tight: 0.2
    trail_r_ceiling: 1.5
    trail_activation_r: 0.3
    trail_activation_bars: 8
    structure_trail_enabled: false
    structure_swing_lookback: 5
    ema_trail_period: 20
  risk:
    risk_pct_a: 0.015
    risk_pct_b: 0.01
    max_risk_pct: 0.02
    max_leverage_major: 15.0
    max_leverage_alt: 12.0
    min_leverage: 0.1
    major_symbols:
      - BTC
      - ETH
  limits:
    max_concurrent_positions: 5
    max_daily_loss_pct: 0.04
    max_consecutive_losses: 6
    max_trades_per_day: 10
    max_correlated_risk_pct: 0.05
  filters:
    funding_filter_enabled: false
    funding_extreme_threshold: 0.001
    funding_reduce_risk_mult: 0.5
  reentry:
    enabled: true
    cooldown_bars: 3
    max_loss_r: 1.5
    max_reentries: 1
    min_confluences_override: 0
  symbol_filter:
    btc_direction: both
    eth_direction: both
    sol_direction: both
  symbols:
    - BTC
    - ETH
    - SOL
