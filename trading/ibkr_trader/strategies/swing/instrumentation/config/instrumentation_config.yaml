# instrumentation/config/instrumentation_config.yaml

bot_id: "swing_multi_01"
bot_name: "Multi-Strategy Swing Trader"
strategy_type: "multi_strategy"     # ATRSS, Helix, Overlay
data_source_id: "ibkr_execution"

data_dir: "instrumentation/data/swing"
rotation:
  max_file_age_days: 30
  max_disk_mb: 500

market_snapshots:
  interval_seconds: 60
  symbols: []                       # auto-populated from bot's active symbols at startup

sidecar:
  relay_url: "http://127.0.0.1:8000/events"
  hmac_secret_env: "INSTRUMENTATION_HMAC_SECRET"
  batch_size: 50
  retry_max: 5
  retry_backoff_base_seconds: 10
  poll_interval_seconds: 60
  buffer_dir: "instrumentation/data/swing/.sidecar_buffer"

logging:
  level: "INFO"
  file: "instrumentation/data/swing/instrumentation.log"
  max_size_mb: 50
  backup_count: 3
