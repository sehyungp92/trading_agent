# Simulation policies for missed opportunity backfill
# Adapted for NQ/MNQ futures via IBKR

simulation_policies:
  # NQDTC v2.1 — 30m box-breakout
  nqdtc:
    entry_fill_model: next_trade
    slippage_model: fixed_bps
    slippage_bps: 2.0
    fees_included: true
    fee_bps: 1.0
    tp_sl_logic: atr_based
    tp_value: 1.5               # TP1 at 1.5R
    sl_value: 1.0
    max_hold_bars: 100

  # VdubusNQ v4.2 — 15m VWAP pullback swing
  vdubus:
    entry_fill_model: next_trade
    slippage_model: fixed_bps
    slippage_bps: 2.0
    fees_included: true
    fee_bps: 1.0
    tp_sl_logic: atr_based
    tp_value: 1.0               # +1R partial trigger
    sl_value: 1.0
    max_hold_bars: 128

  # Downturn Dominator v1 -- short-only regime scalper
  downturn:
    entry_fill_model: next_trade
    slippage_model: fixed_bps
    slippage_bps: 2.0
    fees_included: true
    fee_bps: 1.0
    tp_sl_logic: atr_based
    tp_value: 1.5
    sl_value: 1.0
    max_hold_bars: 150

  # Fallback
  default:
    entry_fill_model: mid
    slippage_model: fixed_bps
    slippage_bps: 3.0
    fees_included: true
    fee_bps: 1.5
    tp_sl_logic: atr_based
    tp_value: 1.5
    sl_value: 1.0
    max_hold_bars: 100
