bot_id: "momentum_nq_01"
bot_name: "Momentum NQ Multi-Strategy"
strategy_type: "multi_strategy_nq"

data_dir: "instrumentation/data/momentum"
data_source_id: "ibkr_cme_nq"

rotation:
  max_file_age_days: 30
  max_disk_mb: 500

market_snapshots:
  interval_seconds: 60
  symbols:
    - "NQ"
    - "MNQ"

sidecar:
  relay_url: "http://127.0.0.1:8000/events"
  hmac_secret_env: "INSTRUMENTATION_HMAC_SECRET"
  batch_size: 50
  retry_max: 5
  retry_backoff_base_seconds: 10
  poll_interval_seconds: 60
  buffer_dir: "instrumentation/data/momentum/.sidecar_buffer"
  use_gzip: false  # Enable when relay supports Content-Encoding: gzip

logging:
  level: "INFO"
  file: "instrumentation/data/momentum/instrumentation.log"
  max_size_mb: 50
  backup_count: 3
