name: trading-agent-ibkr

x-optional-env-file: &optional-env-file
  - path: .env
    required: false

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-ibkr-build: &ibkr-build
  image: trading-agent/ibkr-trading:local
  build:
    context: ../..
    dockerfile: trading/ibkr_trader/Dockerfile

x-ibkr-runtime-env: &ibkr-runtime-env
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ:-America/New_York}
  TRADING_MODE: ${TRADING_MODE:-paper}
  TRADING_ENV: ${TRADING_ENV:-paper}
  DB_HOST: ${DB_HOST:-127.0.0.1}
  DB_PORT: ${DB_PORT:-5432}
  DB_NAME: ${DB_NAME:-trading}
  DB_USER: ${DB_USER:-trading_writer}
  DB_PASSWORD: ${DB_PASSWORD:-changeme}
  IB_HOST: ${IB_HOST:-127.0.0.1}
  IB_PORT: ${IB_PORT:-4002}
  IB_ACCOUNT_ID: ${IB_ACCOUNT_ID:-}
  ACCOUNT_ALIAS: ${ACCOUNT_ALIAS:-ibkr_paper}
  TRADING_ACCOUNT_ALIAS: ${TRADING_ACCOUNT_ALIAS:-ibkr_paper}
  INSTRUMENTATION_RELAY_URL: ${INSTRUMENTATION_RELAY_URL:-}
  INSTRUMENTATION_HMAC_SECRET: ${INSTRUMENTATION_HMAC_SECRET:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: *optional-env-file
    environment:
      POSTGRES_DB: ${DB_NAME:-trading}
      POSTGRES_USER: ${DB_USER:-trading_writer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ibkr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading_writer} -d ${DB_NAME:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *json-logging

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: unless-stopped
    env_file: *optional-env-file
    environment:
      TWS_USERID: ${TWS_USERID:-}
      TWS_PASSWORD: ${TWS_PASSWORD:-}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-exit}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
    ports:
      - "127.0.0.1:${IB_GATEWAY_LIVE_PORT:-4001}:4003"
      - "127.0.0.1:${IB_GATEWAY_PAPER_PORT:-4002}:4004"
      - "127.0.0.1:${IB_GATEWAY_VNC_PORT:-5900}:5900"
    volumes:
      - ibkr-gateway-settings:/root/Jts
    logging: *json-logging

  ibkr-trading:
    <<: *ibkr-build
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: *optional-env-file
    environment: *ibkr-runtime-env
    depends_on:
      postgres:
        condition: service_healthy
      ib-gateway:
        condition: service_started
    command:
      - sh
      - -c
      - >
        ibkr-trading-runtime preflight --config-dir config
        && exec ibkr-trading-runtime run
        --config-dir config
        --effective-config /app/deployments/ibkr/generated/strategies.effective.json
        --connect-ib
    volumes:
      - ibkr-runtime-data:/app/trading/ibkr_trader/data
      - ibkr-instrumentation-data:/app/trading/ibkr_trader/instrumentation/data
      - ../../deployments/ibkr/generated:/app/deployments/ibkr/generated:ro
      - ../../contracts:/app/contracts:ro
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "python", "-c", "import apps.runtime.cli, ibkr_trading; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *json-logging

  ibkr-watchdog:
    <<: *ibkr-build
    profiles: ["monitoring"]
    restart: unless-stopped
    network_mode: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: *optional-env-file
    environment: *ibkr-runtime-env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "apps.watchdog"]
    volumes:
      - ibkr-runtime-data:/app/trading/ibkr_trader/data
      - ibkr-instrumentation-data:/app/trading/ibkr_trader/instrumentation/data
    logging: *json-logging

volumes:
  ibkr-postgres-data:
  ibkr-gateway-settings:
  ibkr-runtime-data:
  ibkr-instrumentation-data:
