name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Check bootstrap gate
        run: python tools/check_repo_bootstrap.py

  workspace-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv
      - name: Check workspace lock
        run: python tools/workspace_lock_check.py

  affected-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Explain affected image rules
        run: python tools/detect_affected_images.py --explain-only
